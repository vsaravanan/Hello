# filename : hello-api.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-api
  labels:
    app: hello-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-api
  template:
    metadata:
      labels:
        app: hello-api
    spec:
      containers:
        - name: hello-api
          image: k8master:5000/hello-api:latest
          imagePullPolicy: Always # This ensures it always pulls the latest
          env:
            - name: SERVER_PORT
              value: "8000"
          ports:
            - containerPort: 8000
env:
  - name: DATABASE_URL
    valueFrom:
      configMapKeyRef:
        name: app-config
        key: database.url

  - name: DATABASE_USER
    valueFrom:
      configMapKeyRef:
        name: app-config
        key: database.user

---
apiVersion: v1
kind: Service
metadata:
  name: hello-api-svc
  labels:
    app: hello-api-svc      # <-- add this — must match ServiceMonitor's selector below
spec:
  type: NodePort
  selector:
    app: hello-api
  ports:
    - name: http # <-- add this: ServiceMonitor's `port: http` matches this name, not the number
      port: 80 # Service port
      targetPort: 8000 # Pod port or container port
      nodePort: 30080 # External port (this works from host)
